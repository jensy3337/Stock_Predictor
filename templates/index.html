<!DOCTYPE html>
<html>
<head>
    <title>Stock Insight</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #050816, #0a0f1c);
            color: #e6f0ff;
        }

        .container {
            width: 85%;
            margin: 40px auto;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #4da6ff;
            margin-bottom: 20px;
        }

        .glass {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(77,166,255,0.15);
        }

        select, button {
            padding: 10px 15px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            background: #1e293b;
            color: white;
        }

        button {
            background: #4da6ff;
            cursor: pointer;
        }

        button:hover {
            background: #3399ff;
        }

        canvas {
            margin-top: 20px;
        }

        .cards {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .card {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            background: rgba(17, 24, 39, 0.7);
            box-shadow: 0 0 15px rgba(77,166,255,0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Stock Market Insight</h1>

    <div class="glass">

        <form method="POST">
            <select name="stock">
                {% for s in stocks %}
                    <option value="{{ s }}" {% if s == selected %}selected{% endif %}>
                        {{ s }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit">Analyze</button>
        </form>

        <canvas id="chart"></canvas>

    </div>

    <div class="cards">
        <div class="card">
            <b>Stock</b><br>
            Ownership in a company
        </div>

        <div class="card">
            <b>Index</b><br>
            Market performance indicator
        </div>

        <div class="card">
            <b>Bull</b><br>
            Rising market
        </div>

        <div class="card">
            <b>Bear</b><br>
            Falling market
        </div>
    </div>

</div>

<script>
    const labels = {{ dates | tojson }};
    const data = {{ prices | tojson }};

    new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Price",
                data: data,
                borderColor: "#4da6ff",
                backgroundColor: "rgba(77,166,255,0.2)",
                tension: 0.4,
                fill: true,
                pointRadius: 2
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: {
                        color: "#fff"
                    }
                }
            },
            scales: {
                x: { ticks: { color: "#aaa" } },
                y: { ticks: { color: "#aaa" } }
            }
        }
    });
</script>

</body>
</html>

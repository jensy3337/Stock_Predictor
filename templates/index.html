<!DOCTYPE html>
<html>
<head>
    <title>Stock Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #0b0f1a;
            color: #e0e6ed;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            color: #4da6ff;
        }

        select, button {
            padding: 10px;
            margin: 10px;
            background: #1a2238;
            color: white;
            border: 1px solid #4da6ff;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        canvas {
            background: #111827;
            border-radius: 10px;
        }

        .learn {
            margin-top: 40px;
            text-align: left;
        }

        .card {
            background: #111827;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #4da6ff;
        }
    </style>
</head>

<body>

    <h1>Stock Market Analysis</h1>

    <form method="POST">
        <select name="stock">
            {% for s in stocks %}
                <option value="{{ s }}" {% if s == selected %}selected{% endif %}>
                    {{ s }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Analyze</button>
    </form>

    <div class="container">
        <canvas id="chart"></canvas>
    </div>

    <div class="learn container">
        <h2>Learn Stock Market</h2>

        <div class="card">
            <b>Stock</b>: A share in the ownership of a company.
        </div>

        <div class="card">
            <b>Index</b>: A group of stocks representing market performance (e.g., NIFTY 50).
        </div>

        <div class="card">
            <b>Bull Market</b>: Market is rising.
        </div>

        <div class="card">
            <b>Bear Market</b>: Market is falling.
        </div>

        <div class="card">
            <b>Volume</b>: Number of shares traded.
        </div>
    </div>

    <script>
        const labels = {{ dates | tojson }};
        const data = {{ prices | tojson }};

        const ctx = document.getElementById('chart').getContext('2d');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Price',
                    data: data,
                    borderColor: '#4da6ff',
                    backgroundColor: 'rgba(77,166,255,0.2)',
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    tooltip: {
                        enabled: true
                    }
                }
            }
        });
    </script>

</body>
</html>

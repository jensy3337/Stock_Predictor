<!DOCTYPE html>
<html>
<head>
    <title>PredictX</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0b1120, #020617);
            color: #e2e8f0;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 20px;
            color: #38bdf8;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            color: #94a3b8;
        }

        /* MAIN */
        .container {
            width: 90%;
            margin: auto;
            padding: 30px 0;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        /* CARD */
        .card {
            background: rgba(15, 23, 42, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(56,189,248,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .title {
            font-size: 18px;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        /* STOCK LIST */
        .stock {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }

        /* CHART */
        canvas {
            background: #020617;
            border-radius: 10px;
            margin-top: 20px;
        }

        /* SELECT */
        select, button {
            padding: 10px;
            margin-top: 10px;
            background: #1e293b;
            color: white;
            border: none;
        }

    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">PredictX</div>
    <div class="nav-links">
        <div>Markets</div>
        <div>Predictions</div>
    </div>
</div>

<div class="container">

    <h1>Market Overview</h1>

    <div class="grid">

        <!-- NIFTY -->
        <div class="card">
            <div class="title">NIFTY50</div>

            <div class="stock">Reliance <span>₹3,290</span></div>
            <div class="stock">TCS <span>₹4,163</span></div>
            <div class="stock">HDFC <span>₹1,739</span></div>
        </div>

        <!-- SENSEX -->
        <div class="card">
            <div class="title">SENSEX</div>

            <div class="stock">Infosys <span>₹1,717</span></div>
            <div class="stock">Wipro <span>₹523</span></div>
            <div class="stock">Bajaj <span>₹7,984</span></div>
        </div>

        <!-- BANK -->
        <div class="card">
            <div class="title">NIFTY BANK</div>

            <div class="stock">ICICI <span>₹1,270</span></div>
            <div class="stock">Kotak <span>₹2,171</span></div>
            <div class="stock">Axis <span>₹1,191</span></div>
        </div>

    </div>

    <!-- ANALYSIS -->
    <div class="card" style="margin-top:30px;">

        <form method="POST">
            <select name="stock">
                {% for s in stocks %}
                    <option value="{{ s }}" {% if s == selected %}selected{% endif %}>
                        {{ s }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit">Analyze</button>
        </form>

        <canvas id="chart"></canvas>

    </div>

</div>

<script>
    const labels = {{ dates | tojson }};
    const data = {{ prices | tojson }};

    new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Price",
                data: data,
                borderColor: "#38bdf8",
                tension: 0.4,
                fill: false
            }]
        }
    });
</script>

</body>
</html>

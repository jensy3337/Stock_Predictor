<!DOCTYPE html>
<html>
<head>
    <title>Stock Market Insight</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            background: #0a0f1c;
            color: #e6f0ff;
            font-family: Arial;
        }

        header {
            background: #111827;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            color: #4da6ff;
        }

        .container {
            width: 80%;
            margin: 30px auto;
            text-align: center;
        }

        select, button {
            padding: 10px;
            margin: 10px;
            background: #1e293b;
            color: white;
            border: 1px solid #4da6ff;
        }

        canvas {
            background: #111827;
            border-radius: 10px;
            padding: 10px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .card {
            background: #111827;
            padding: 15px;
            border-left: 4px solid #4da6ff;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            background: #111827;
        }
    </style>
</head>

<body>

<header>Stock Market Insight</header>

<div class="container">

    <form method="POST">
        <select name="stock">
            {% for s in stocks %}
                <option value="{{ s }}" {% if s == selected %}selected{% endif %}>
                    {{ s }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Analyze</button>
    </form>

    <canvas id="chart"></canvas>

    <div class="cards">
        <div class="card">
            <b>Stock</b><br>
            Ownership in a company.
        </div>

        <div class="card">
            <b>Index</b><br>
            Represents market performance.
        </div>

        <div class="card">
            <b>Bull Market</b><br>
            Prices are rising.
        </div>

        <div class="card">
            <b>Bear Market</b><br>
            Prices are falling.
        </div>
    </div>

</div>

<footer>Indian Market Analysis Dashboard</footer>

<script>
    const labels = {{ dates | tojson }};
    const data = {{ prices | tojson }};

    new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Price",
                data: data,
                borderColor: "#4da6ff",
                tension: 0.3
            }]
        }
    });
</script>

</body>
</html>
